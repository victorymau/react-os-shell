<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="hair" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b1d10"/>
      <stop offset="100%" stop-color="#5e2f1c"/>
    </linearGradient>
    <linearGradient id="hairHi" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a05a3c" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#d97757" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="laptop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d1d5db"/>
      <stop offset="100%" stop-color="#9ca3af"/>
    </linearGradient>
    <radialGradient id="cheek" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#f9a8a4" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#f9a8a4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="100" fill="url(#bg)"/>

  <!-- Face (skin) -->
  <ellipse cx="100" cy="92" rx="44" ry="50" fill="#f6cfae"/>

  <!-- Cheek blush -->
  <ellipse cx="76" cy="100" rx="11" ry="8" fill="url(#cheek)"/>
  <ellipse cx="124" cy="100" rx="11" ry="8" fill="url(#cheek)"/>

  <!-- Hair (swept-up tousled style) -->
  <path d="M58 80
           C 58 50, 80 36, 100 36
           C 122 36, 144 50, 144 78
           C 144 78, 138 50, 122 48
           C 132 56, 134 70, 132 76
           C 124 60, 110 52, 102 56
           C 110 64, 110 76, 106 80
           C 100 64, 88 56, 80 60
           C 86 68, 86 78, 82 84
           C 76 72, 66 66, 60 70
           C 60 76, 58 80, 58 80 Z"
        fill="url(#hair)"/>
  <path d="M70 60 C 78 48, 96 42, 108 46 C 100 50, 92 56, 84 64 Z" fill="url(#hairHi)"/>

  <!-- Eyebrows -->
  <path d="M70 84 q 8 -4 18 0" stroke="#3b1d10" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M112 84 q 8 -4 18 0" stroke="#3b1d10" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Glasses frames -->
  <g stroke="#e5e7eb" stroke-width="2.5" fill="white" fill-opacity="0.18">
    <ellipse cx="79" cy="100" rx="14" ry="11"/>
    <ellipse cx="121" cy="100" rx="14" ry="11"/>
    <line x1="93" y1="100" x2="107" y2="100" stroke-linecap="round"/>
  </g>

  <!-- Eyes -->
  <circle cx="79" cy="100" r="4" fill="#1f2937"/>
  <circle cx="121" cy="100" r="4" fill="#1f2937"/>
  <circle cx="80" cy="98.5" r="1.2" fill="#ffffff"/>
  <circle cx="122" cy="98.5" r="1.2" fill="#ffffff"/>

  <!-- Nose hint -->
  <path d="M100 108 q -3 8 0 12" stroke="#c98a6c" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.6"/>

  <!-- Laptop covering lower face -->
  <rect x="40" y="138" width="120" height="50" rx="3" fill="url(#laptop)"/>
  <rect x="40" y="138" width="120" height="50" rx="3" fill="none" stroke="#6b7280" stroke-width="1.2"/>
  <!-- Apple-ish circle on the lid (subtle) -->
  <circle cx="100" cy="163" r="9" fill="#6b7280" opacity="0.55"/>
  <circle cx="100" cy="160" r="2.5" fill="#9ca3af" opacity="0.7"/>
  <!-- Laptop hinge shadow -->
  <rect x="40" y="186" width="120" height="3" fill="#4b5563" opacity="0.5"/>
</svg>
